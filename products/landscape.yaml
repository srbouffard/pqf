id: landscape
name: "Landscape"
description: "Ubuntu systems management and compliance platform"
lifecycle: stable
target_medal: gold
ownership:
  squad: emea
  stakeholders:
    - "Landscape Team"
    - "Enterprise"
  users:
    - "Enterprise customers"
    - "Managed Services"
documentation_url: "https://ubuntu.com/landscape"
allure_report_url: ""
components:
  foundational:
    - id: landscape-server
      type: charm
      github_repo: canonical/landscape-charmed
    - id: postgresql
      type: charm
      github_repo: canonical/postgresql-operator
    - id: haproxy
      type: charm
      github_repo: canonical/haproxy-operator
  auxiliary:
    - id: rabbitmq-server
      type: charm
      github_repo: canonical/rabbitmq-operator
