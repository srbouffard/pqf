name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  python:
    name: Python (lint + format + tests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: make install

      - name: Lint
        run: make lint

      - name: Format check
        run: make format-check

      - name: Validate config schemas
        run: make validate

      - name: Tests
        run: make test
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OPENROUTER_API_KEY: ""

  ui:
    name: UI (typecheck + tests + build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Install dependencies
        run: make install-ui

      - name: Type check
        run: cd ui && npx tsc --noEmit

      - name: Tests
        run: make test-ui

      - name: Build
        run: make build

  security:
    name: Security scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install pip-audit + project deps
        run: pip install pip-audit && make install

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Install UI deps
        run: make install-ui

      - name: Audit
        run: make audit
        continue-on-error: true

